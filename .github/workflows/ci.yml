name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      # `test:coverage` plutôt que `test` : les seuils de vitest.config.ts ne
      # servent à rien s'ils ne sont pas évalués en CI. Ce sont des seuils
      # CLIQUET, calés sous le niveau actuel — ils interdisent la régression,
      # ils n'attestent pas d'une cible atteinte.
      - name: Test
        run: yarn test:coverage
