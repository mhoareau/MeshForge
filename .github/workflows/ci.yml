name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: meshforge_test
          POSTGRES_USER: meshforge_test
          POSTGRES_PASSWORD: meshforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U meshforge_test -d meshforge_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      # `test:coverage` plutôt que `test` : les seuils de vitest.config.ts ne
      # servent à rien s'ils ne sont pas évalués en CI. Ce sont des seuils
      # CLIQUET, calés sous le niveau actuel — ils interdisent la régression,
      # ils n'attestent pas d'une cible atteinte.
      - name: Test
        run: yarn test:coverage
        env:
          RUN_DB_TESTS: "1"
          DATABASE_URL: postgresql://meshforge_test:meshforge_test@127.0.0.1:5432/meshforge_test
