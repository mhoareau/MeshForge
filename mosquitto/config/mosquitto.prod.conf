# MeshForge — Configuration Mosquitto PRODUCTION (mosquitto-go-auth).
#
# Authentifie les relais (table `contributors`) contre PostgreSQL au lieu de
# l'anonyme du dev. Image requise : un mosquitto incluant le plugin go-auth
# compilé (ex : iegomez/mosquitto-go-auth) — voir docker-compose.prod.yml.
#
# Le plugin go-auth est INCLUS dans l'image iegomez/mosquitto-go-auth -> testable
# EN LOCAL via docker-compose.prod.yml (pas de compilation Go). ⚠️ Seuls les
# chemins (plugin .so, montage de la config) peuvent varier selon la version de
# l'image -> à valider. Réf : github.com/iegomez/mosquitto-go-auth
#
# Uplink only : un relais ne peut que PUBLIER (write) sur msh/# — jamais
# subscribe (downlink OFF). Révocation : contributors.is_active = false.

allow_anonymous false

listener 1883
listener 9001
protocol websockets

# --- Plugin go-auth ---
auth_plugin /mosquitto/go-auth.so
auth_opt_backends postgres
auth_opt_hasher bcrypt
auth_opt_hasher_cost 12

# Connexion DB. Mosquitto n'interpole PAS les variables d'env : le placeholder
# __DB_PASSWORD__ est remplacé au DÉMARRAGE par l'entrypoint (mosquitto/entrypoint.sh)
# depuis $DB_PASSWORD. Aucun secret en clair ici -> ce fichier est un TEMPLATE
# committable (le vrai mot de passe vit dans l'env, jamais dans le repo ni l'image).
auth_opt_pg_host     timescaledb
auth_opt_pg_port     5432
auth_opt_pg_dbname   meshforge
auth_opt_pg_user     meshforge
auth_opt_pg_password __DB_PASSWORD__
auth_opt_pg_sslmode  disable

# Auth : bcrypt du token, seulement si le compte est actif (-> révocation).
auth_opt_pg_userquery SELECT password FROM contributors WHERE username = $1 AND is_active = true LIMIT 1

# Superuser = compte ADMIN actif : accès broker complet (pub + SUBSCRIBE).
# Le worker MeshForge se connecte avec un compte ADMIN (MQTT_USERNAME/PASSWORD)
# car il doit SUBSCRIBE pour ingérer — les relais (USER), eux, ne font que publier.
auth_opt_pg_superquery SELECT COUNT(*) FROM contributors WHERE username = $1 AND role = 'ADMIN' AND is_active = true

# ACL des non-superusers (relais USER) : PUBLIER (acc=2) sur msh/# uniquement,
# pas de subscribe (uplink only). $1 = username, $2 = type d'accès demandé.
auth_opt_pg_aclquery SELECT 'msh/#' WHERE $2 = 2 AND EXISTS (SELECT 1 FROM contributors WHERE username = $1 AND is_active = true)

log_type error
log_type warning
log_type information
