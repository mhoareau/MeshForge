# MeshForge — Configuration Mosquitto 
#
# "Uplink only" : les gateways Meshtastic publient leur trafic ici, le worker
# MeshForge ne fait que SUBSCRIBE. Le broker ne réinjecte rien dans le mesh
# (downlink OFF, réglé côté gateway Meshtastic).
#
# Auth anonyme : DEV UNIQUEMENT. La prod passe par mosquitto-go-auth +
# allow_anonymous false (cf. docs/deploiement.md et docs/alertes.md).

allow_anonymous true

# Listener MQTT standard (gateways Meshtastic)
listener 1883

# Listener WebSocket (debug / clients web éventuels)
listener 9001
protocol websockets

log_type error
log_type warning
log_type information
