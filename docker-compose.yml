# MeshForge — infra de base. Lance db + broker (anonyme) pour le DEV.
#   Dev  : docker compose up -d   (app + worker en `yarn`, hot-reload)
#   Prod : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#          (override : broker authentifié go-auth + app + worker conteneurisés)

services:
  # TimescaleDB : Postgres 16 + extension time-series. db/init.sql est joué
  # automatiquement au PREMIER démarrage (volume vide uniquement).
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: meshforge-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: meshforge
      POSTGRES_USER: meshforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-meshforge}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshforge -d meshforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Mosquitto : broker MQTT. Les gateways Meshtastic publient sur msh/#.
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: meshforge-mqtt
    restart: unless-stopped
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
      - "9001:9001"

volumes:
  timescaledb_data:
