# MeshForge — Infra locale (Phase 1)
# Démarrage : docker compose up -d   (cf. docs/deploiement.md)
# Le worker MQTT et Next.js tournent HORS Docker en dev.

services:
  # TimescaleDB : Postgres 16 + extension time-series. db/init.sql est joué
  # automatiquement au PREMIER démarrage (volume vide uniquement).
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: meshforge-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: meshforge
      POSTGRES_USER: meshforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-meshforge}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

  # Mosquitto : broker MQTT. Les gateways Meshtastic publient sur msh/#.
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: meshforge-mqtt
    restart: unless-stopped
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
      - "9001:9001"

volumes:
  timescaledb_data:
